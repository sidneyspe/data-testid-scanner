<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data-TestID Scanner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    body {
      width: 900px;
      max-height: 600px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
    .table-container {
      max-height: 500px;
      overflow-y: auto;
    }
    i {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body class="bg-gray-50">
  <div class="p-6">
    <!-- Header com Seletor de Idioma -->
    <div class="flex justify-between items-start mb-6">
      <div>
        <h1 class="text-2xl font-bold text-gray-900" data-i18n="appTitle">Data-TestID Scanner</h1>
        <p class="text-gray-600 text-sm mt-1" data-i18n="appDescription">Escaneia todos os data-test-id da página</p>
      </div>
      <div class="flex items-center gap-2">
        <label for="languageSelect" class="text-xs text-gray-600">🌐</label>
        <select id="languageSelect" class="text-xs border border-gray-300 rounded px-2 py-1 bg-white text-gray-700 cursor-pointer hover:border-gray-400">
          <option value="pt">Português</option>
          <option value="en">English</option>
          <option value="es">Español</option>
        </select>
      </div>
    </div>

    <!-- Botões de Ação -->
    <div class="flex gap-3 mb-6">
      <button
        id="scanBtn"
        class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2"
      >
        <i class="ph ph-magnifying-glass"></i>
        <span data-i18n="scanButton">Escanear</span>
      </button>
      <button
        id="exportBtn"
        class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2"
        disabled
      >
        <i class="ph ph-download-simple"></i>
        <span data-i18n="exportButton">Exportar CSV</span>
      </button>
      <button
        id="copyBtn"
        class="bg-purple-600 hover:bg-purple-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2"
        disabled
      >
        <i class="ph ph-copy"></i>
        <span data-i18n="copyButton">Copiar</span>
      </button>
    </div>

    <!-- Informações do Scan -->
    <div id="infoBox" class="mb-4 p-3 bg-blue-50 border border-blue-200 rounded-lg text-blue-700 text-sm hidden flex items-center gap-2">
      <i class="ph ph-info text-lg flex-shrink-0"></i>
      <strong id="infoText"></strong>
    </div>

    <!-- Tabela de Resultados -->
    <div class="table-container border border-gray-200 rounded-lg bg-white">
      <table class="w-full text-sm">
        <thead class="bg-gray-100 sticky top-0 border-b border-gray-200">
          <tr>
            <th class="px-4 py-3 text-left font-semibold text-gray-700">#</th>
            <th class="px-4 py-3 text-left font-semibold text-gray-700">data-test-id</th>
            <th class="px-4 py-3 text-left font-semibold text-gray-700" data-i18n="elementType">Tipo de Elemento</th>
            <th class="px-4 py-3 text-center font-semibold text-gray-700" data-i18n="actions">Ações</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="4" class="px-4 py-8 text-center text-gray-400" data-i18n="emptyScan">
              Clique em "Escanear" para listar todos os data-test-id
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Footer -->
    <div class="mt-4 text-xs text-gray-500 text-center">
      <p><span data-i18n="totalElements">Total de elementos encontrados</span>: <strong id="totalCount">0</strong></p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
