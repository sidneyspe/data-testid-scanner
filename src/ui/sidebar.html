<!-- Botão flutuante para abrir/fechar o sidebar -->
<button id="dts-toggle-btn" class="dts-toggle-btn" title="Data-TestID Scanner">
  <i class="ph ph-code"></i>
</button>

<!-- Sidebar do Data-TestID Scanner -->
<div id="data-testid-scanner-sidebar" class="dts-sidebar--hidden">
  <!-- Header -->
  <div class="dts-header">
    <div class="dts-header__top">
      <div class="dts-header__content">
        <div class="dts-header__logo">
          <i class="ph ph-code"></i>
        </div>
        <div class="dts-header__text">
          <h1 class="dts-header__title" data-i18n="appTitle">
            Data-TestID Scanner
          </h1>
          <p class="dts-header__description" data-i18n="appDescription">
            Escaneia todos os data-test-id da página
          </p>
        </div>
      </div>
      <div class="dts-header__controls">
        <select id="dts-language-select" class="dts-language-select">
          <option value="pt">Português</option>
          <option value="en">English</option>
          <option value="es">Español</option>
        </select>
        <button id="dts-theme-btn" class="dts-theme-btn" title="Alternar tema">
          <i class="ph ph-moon"></i>
        </button>
        <button id="dts-close-btn" class="dts-close-btn" title="Fechar">
          <i class="ph ph-x"></i>
        </button>
      </div>
    </div>

    <!-- Botões de Ação -->
    <div class="dts-actions">
      <button id="dts-scan-btn" class="dts-btn dts-btn--primary">
        <i class="ph ph-magnifying-glass"></i>
        <span data-i18n="scanButton">Escanear</span>
      </button>
      <button id="dts-export-btn" class="dts-btn dts-btn--success" disabled>
        <i class="ph ph-download-simple"></i>
        <span data-i18n="exportButton">Exportar CSV</span>
      </button>
      <button id="dts-copy-btn" class="dts-btn dts-btn--primary" disabled>
        <i class="ph ph-copy"></i>
        <span data-i18n="copyButton">Copiar Tudo</span>
      </button>
    </div>

    <!-- Alert Box -->
    <div id="dts-alert" class="dts-alert dts-alert--hidden dts-alert--info">
      <div class="dts-alert__icon">
        <i class="ph ph-info"></i>
      </div>
      <div class="dts-alert__content" id="dts-alert-message"></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="dts-tabs">
    <button id="dts-tab-found" class="dts-tab dts-tab--active" data-tab="found">
      <i class="ph ph-check-circle"></i>
      <span data-i18n="totalElements">Total de elementos encontrados</span>
      <span class="dts-tab__badge" id="dts-found-count">0</span>
    </button>
    <button id="dts-tab-missing" class="dts-tab" data-tab="missing">
      <i class="ph ph-warning"></i>
      <span data-i18n="missingTitle">Sem data-test-id</span>
      <span
        class="dts-tab__badge dts-tab__badge--warning"
        id="dts-missing-count"
        >0</span
      >
    </button>
  </div>

  <!-- Painel: Encontrados -->
  <div id="dts-panel-found" class="dts-panel dts-panel--active">
    <!-- Campo de Busca -->
    <div class="dts-search-container">
      <div class="dts-search">
        <i class="ph ph-magnifying-glass"></i>
        <input
          type="text"
          id="dts-search-input"
          placeholder="Filtrar por data-test-id ou tipo..."
          class="dts-search-input"
        />
      </div>
    </div>

    <div class="dts-table-container">
      <table class="dts-table">
        <thead>
          <tr>
            <th style="width: 36px; text-align: center">#</th>
            <th style="width: auto">
              data-test-id
              <i
                class="ph ph-info"
                style="font-size: 14px; margin-left: 4px; cursor: help"
                title="Clique no item para copiar para a área de transferência"
              ></i>
            </th>
            <th
              data-i18n="elementType"
              style="width: auto; white-space: nowrap; cursor: pointer"
              id="dts-sort-type"
            >
              Tipo
              <i
                class="ph ph-arrows-down-up"
                style="font-size: 12px; margin-left: 4px"
              ></i>
            </th>
          </tr>
        </thead>
        <tbody id="dts-table-body">
          <tr>
            <td colspan="3" class="dts-table__empty" data-i18n="emptyScan">
              Clique em "Escanear" para listar todos os data-test-id
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Painel: Sem data-test-id -->
  <div id="dts-panel-missing" class="dts-panel">
    <div class="dts-table-container">
      <table class="dts-table">
        <thead>
          <tr>
            <th style="width: 36px; text-align: center">#</th>
            <th data-i18n="missingElement" style="width: 55%">Elemento</th>
            <th data-i18n="missingContext">Contexto</th>
          </tr>
        </thead>
        <tbody id="dts-missing-body">
          <tr>
            <td colspan="3" class="dts-table__empty" data-i18n="emptyScan">
              Clique em "Escanear" para listar todos os data-test-id
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Footer -->
  <div class="dts-footer">
    <p>
      <span data-i18n="totalElements">Total de elementos encontrados</span>:
      <span class="dts-footer__count" id="dts-total-count">0</span>
    </p>
  </div>
</div>
